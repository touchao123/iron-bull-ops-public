<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" width="920" height="620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    .title { font-size: 20px; font-weight: 650; fill: #172033; font-family: sans-serif; }
    .label { font-size: 14px; font-weight: 600; fill: #172033; font-family: sans-serif; }
    .small { font-size: 12px; fill: #5b6475; font-family: sans-serif; }
    .edge { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .zone { fill: none; stroke: #64748b; stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.8; }
    .node { stroke: #64748b; stroke-width: 1; rx: 10; }
    .actor { fill: #bfdbfe; stroke: #64748b; stroke-width: 1; rx: 40; }
    .input { fill: #bfdbfe; }
    .process { fill: #c7d2fe; }
    .storage { fill: #99f6e4; }
    .external { fill: #fde68a; }
    .risk { fill: #fecaca; }
    .neutral { fill: #e2e8f0; }
    .legend-box { fill: none; stroke: #64748b; stroke-width: 0.5; stroke-dasharray: 4 3; opacity: 0.6; }
    .legend-swatch { stroke: #64748b; stroke-width: 0.5; }
  </style>

  <!-- Background -->
  <rect width="920" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="460" y="40" text-anchor="middle" class="title">🎯 单词消消乐 — Use Case 图</text>
  <text x="460" y="62" text-anchor="middle" class="small">女儿自己动手做的单词配对游戏</text>

  <!-- System Boundary -->
  <rect x="260" y="80" width="620" height="490" rx="12" class="zone" />
  <text x="280" y="105" class="label" fill="#64748b" font-size="13">单词消消乐 App</text>

  <!-- Connectors (behind nodes) -->
  <path d="M 120,300 L 340,155" class="edge" marker-end="url(#arrow)"/>
  <path d="M 120,300 L 340,230" class="edge" marker-end="url(#arrow)"/>
  <path d="M 120,300 L 580,230" class="edge" marker-end="url(#arrow)"/>
  <path d="M 120,300 L 340,305" class="edge" marker-end="url(#arrow)"/>
  <path d="M 120,300 L 580,305" class="edge" marker-end="url(#arrow)"/>
  <path d="M 120,300 L 340,380" class="edge" marker-end="url(#arrow)"/>
  <path d="M 120,300 L 580,380" class="edge" marker-end="url(#arrow)"/>
  <path d="M 120,300 L 460,455" class="edge" marker-end="url(#arrow)"/>

  <!-- Actor -->
  <rect x="40" y="260" width="80" height="80" class="actor" />
  <text x="80" y="295" text-anchor="middle" class="label">👧</text>
  <text x="80" y="315" text-anchor="middle" class="small">玩家</text>

  <!-- Use Cases -->
  <rect x="280" y="130" width="200" height="50" class="node process" />
  <text x="380" y="160" text-anchor="middle" class="label">开始游戏</text>

  <rect x="280" y="205" width="200" height="50" class="node neutral" />
  <text x="380" y="235" text-anchor="middle" class="label">翻转卡片配对</text>

  <rect x="520" y="205" width="200" height="50" class="node neutral" />
  <text x="620" y="235" text-anchor="middle" class="label">学习单词</text>

  <rect x="280" y="280" width="200" height="50" class="node storage" />
  <text x="380" y="310" text-anchor="middle" class="label">查看闯关进度</text>

  <rect x="520" y="280" width="200" height="50" class="node input" />
  <text x="620" y="310" text-anchor="middle" class="label">选择难度/单元</text>

  <rect x="280" y="355" width="200" height="50" class="node external" />
  <text x="380" y="385" text-anchor="middle" class="label">听发音（朗读）</text>

  <rect x="520" y="355" width="200" height="50" class="node storage" />
  <text x="620" y="385" text-anchor="middle" class="label">赚星星⭐攒金币</text>

  <rect x="400" y="430" width="200" height="50" class="node risk" />
  <text x="500" y="460" text-anchor="middle" class="label">装饰收集</text>

  <!-- Legend -->
  <rect x="40" y="460" width="170" height="110" rx="8" class="legend-box" />
  <text x="58" y="482" class="small" font-weight="650">图例</text>
  <rect x="58" y="492" width="14" height="14" rx="3" class="legend-swatch input" />
  <text x="80" y="504" class="small">入口/选择</text>
  <rect x="58" y="512" width="14" height="14" rx="3" class="legend-swatch process" />
  <text x="80" y="524" class="small">核心操作</text>
  <rect x="58" y="532" width="14" height="14" rx="3" class="legend-swatch storage" />
  <text x="80" y="544" class="small">数据/进度</text>
</svg>
